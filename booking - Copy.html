<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجز موعد - Clinic</title>
    
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ocean: { 
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 
                            400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 
                            800: '#075985', 900: '#0c4a6e' 
                        }
                    }
                }
            }
        }
    </script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F0F9FF; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        input, select { transition: all 0.3s ease; }
        input:focus, select:focus { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.15); }

        /* سكرول الأوقات للموبايل */
        .slots-container::-webkit-scrollbar { height: 4px; width: 4px; }
        .slots-container::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- إعدادات قاعدة البيانات الخاصة بكِ (حقيقية وتعمل 100%) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAu8OQruKu9T_2a5kgmSHkOYgXnXcc969U",
            authDomain: "clinic-management-system-f23b2.firebaseapp.com",
            projectId: "clinic-management-system-f23b2",
            storageBucket: "clinic-management-system-f23b2.firebasestorage.app",
            messagingSenderId: "979868858647",
            appId: "1:979868858647:web:ea0752eda9d2777e7f5f52",
            measurementId: "G-VV1H232RFN"
        };

        // تهيئة آمنة لمنع الانهيار (White Screen)
        let db = null;
        let auth = null;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) { console.error("Firebase Error:", e); }

        // --- المواعيد المتاحة (من 4 عصراً لـ 10 مساءً، كل نص ساعة) ---
        const ALL_SLOTS = [
            "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", 
            "19:00", "19:30", "20:00", "20:30", "21:00", "21:30", "22:00"
        ];

        // تحويل الوقت لنظام 12 ساعة للقراءة السهلة
        const formatTime = (time24) => {
            const [h, m] = time24.split(':');
            let hours = parseInt(h, 10);
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12 || 12;
            return `${hours}:${m} ${ampm}`;
        };

        // --- الأيقونات ---
        const Icons = {
            User: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Phone: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
            Calendar: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Clock: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Stethoscope: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"></path><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"></path><circle cx="20" cy="10" r="2"></circle></svg>,
            Check: () => <svg width="48" height="48" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
            Key: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>,
            Trash: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Edit: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            ArrowRight: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>,
            X: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        };

        function App() {
            // States (حالات التطبيق)
            const [view, setView] = useState('book'); // التنقل بين الشاشات
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [error, setError] = useState("");
            
            // بيانات الاستمارة (البيانات في الأول، والتاريخ/الوقت في الآخر)
            const [formData, setFormData] = useState({ patientName: '', phone: '', service: '' });
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedTime, setSelectedTime] = useState(null);
            
            // إدارة الحجوزات لتفادي التداخل وإنشاء كود
            const [appointments, setAppointments] = useState([]);
            const [bookingCode, setBookingCode] = useState(""); 
            const [currentApp, setCurrentApp] = useState(null); // لو المريض بيعدل حجزه

            // جلب المواعيد من Firebase
            useEffect(() => {
                if (!db) return;
                auth.signInAnonymously(); // الدخول الصامت لضمان قراءة البيانات
                const unsub = db.collection('appointments').onSnapshot(snap => {
                    setAppointments(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
                return () => unsub();
            }, []);

            // حساب المواعيد المحجوزة بالفعل في اليوم المختار
            const bookedSlots = useMemo(() => {
                return appointments
                    .filter(app => app.date === selectedDate && (!currentApp || app.id !== currentApp.id)) 
                    .map(app => app.time);
            }, [appointments, selectedDate, currentApp]);

            // إلغاء تحديد الوقت إذا غير المريض اليوم وكان الوقت غير متاح
            useEffect(() => {
                if (bookedSlots.includes(selectedTime)) setSelectedTime(null);
            }, [selectedDate, bookedSlots, selectedTime]);

            // دالة الإرسال (تأكيد الحجز)
            const handleBookingSubmit = async (e) => {
                e.preventDefault();
                if (!selectedTime) {
                    setError("الرجاء اختيار الوقت المناسب من المواعيد المتاحة أسفل التاريخ.");
                    return;
                }
                
                setIsSubmitting(true);
                setError("");

                // إنشاء كود سري للمريض (مثال: C4821)
                const generatedCode = currentApp ? currentApp.bookingCode : "C" + Math.floor(1000 + Math.random() * 9000);

                const appointmentData = {
                    patientName: formData.patientName,
                    phone: formData.phone,
                    date: selectedDate,
                    time: selectedTime,
                    service: formData.service || "كشف عام",
                    branchId: "all", // بما إنه فرع واحد
                    recordedBy: "المريض (تطبيق)", 
                    bookingCode: generatedCode,
                    timestamp: new Date().toISOString()
                };

                try {
                    if (currentApp) {
                        // تحديث
                        await db.collection("appointments").doc(currentApp.id).update(appointmentData);
                    } else {
                        // إضافة جديد
                        await db.collection("appointments").add(appointmentData);
                    }
                    
                    setBookingCode(generatedCode);
                    setIsSubmitting(false);
                    setView('success');
                    
                    // تفريغ الخانات
                    setFormData({ patientName: '', phone: '', service: '' });
                    setSelectedTime(null);
                    setCurrentApp(null);
                } catch (err) {
                    console.error(err);
                    setError("حدث خطأ أثناء الاتصال بالنظام. الرجاء المحاولة مرة أخرى.");
                    setIsSubmitting(false);
                }
            };

            // دالة البحث عن الحجز لتعديله أو إلغائه
            const handleSearchBooking = (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setError("");

                const searchCode = e.target.searchCode.value.trim().toUpperCase();
                const found = appointments.find(a => a.bookingCode === searchCode);
                
                if (found) {
                    setCurrentApp(found);
                    setView('manageAction');
                } else {
                    setError("تأكد من إدخال الكود بشكل صحيح. لا يوجد حجز بهذا الكود.");
                }
                setIsSubmitting(false);
            };

            // دالة الحذف
            const handleDeleteBooking = async () => {
                if(window.confirm("هل أنت متأكد من رغبتك في إلغاء هذا الحجز نهائياً؟")) {
                    setIsSubmitting(true);
                    try {
                        await db.collection('appointments').doc(currentApp.id).delete();
                        alert("تم إلغاء موعدك بنجاح. نتمنى لك دوام الصحة.");
                        setView('book');
                        setCurrentApp(null);
                    } catch (e) {
                        alert("حدث خطأ أثناء الإلغاء.");
                    }
                    setIsSubmitting(false);
                }
            };

            // تجهيز التعديل
            const handleEditBooking = () => {
                setFormData({
                    patientName: currentApp.patientName,
                    phone: currentApp.phone,
                    service: currentApp.service === "كشف عام" ? "" : currentApp.service
                });
                setSelectedDate(currentApp.date);
                setSelectedTime(currentApp.time);
                setView('book');
            };

            // لتحديد الأوقات الماضية في اليوم الحالي وإغلاقها
            const todayStr = new Date().toISOString().split('T')[0];
            const currentHour = new Date().getHours();
            const currentMinute = new Date().getMinutes();

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden">
                    {/* خلفية زرقاء أنيقة جداً وبسيطة للموبايل */}
                    <div className="fixed top-0 left-0 w-full h-64 bg-gradient-to-br from-ocean-700 to-ocean-500 rounded-b-[40px] shadow-lg z-0"></div>
                    
                    <div className="relative z-10 flex-1 flex flex-col items-center p-4 sm:p-8 pt-8">
                        
                        {/* الهيدر */}
                        <div className="text-center mb-6 animate-fade-in relative w-full max-w-lg">
                            {view !== 'book' && (
                                <button onClick={() => {setView('book'); setCurrentApp(null); setFormData({ patientName: '', phone: '', service: '' });}} className="absolute right-0 top-0 text-white/80 hover:text-white flex items-center gap-1 font-bold text-sm bg-black/10 px-3 py-1.5 rounded-full backdrop-blur-sm">
                                    <Icons.ArrowRight/> رجوع
                                </button>
                            )}
                            <h1 className="text-4xl sm:text-5xl font-black text-white tracking-widest mb-1 drop-shadow-md">CLINIC</h1>
                            <p className="text-ocean-100 text-[10px] sm:text-xs font-bold tracking-[0.4em] uppercase">Online Booking</p>
                        </div>

                        {/* ===================== 1. شاشة الحجز ===================== */}
                        {view === 'book' && (
                            <div className="bg-white w-full max-w-lg rounded-[30px] shadow-2xl p-6 sm:p-8 animate-slide-up">
                                
                                <div className="mb-6 text-center">
                                    <h2 className="text-xl font-black text-gray-800 mb-1">{currentApp ? 'تعديل موعدك' : 'حجز موعد جديد'}</h2>
                                    <p className="text-gray-500 text-xs font-bold">{currentApp ? 'حدث بياناتك والوقت المطلوب' : 'أدخل بياناتك ثم اختر الموعد المناسب'}</p>
                                </div>

                                {error && <div className="bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold mb-6 text-center border border-red-100 animate-pop">{error}</div>}

                                <form onSubmit={handleBookingSubmit} className="space-y-6">
                                    
                                    {/* القسم الأول: بيانات المريض */}
                                    <div className="space-y-3">
                                        <div className="relative">
                                            <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none text-ocean-400"><Icons.User /></div>
                                            <input type="text" value={formData.patientName} onChange={e=>setFormData({...formData, patientName: e.target.value})} required placeholder="الاسم بالكامل" className="w-full bg-ocean-50/50 border border-ocean-100 focus:border-ocean-500 p-3.5 pr-12 rounded-2xl outline-none font-bold text-gray-800 text-sm placeholder-gray-400 shadow-sm" />
                                        </div>

                                        <div className="relative">
                                            <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none text-ocean-400"><Icons.Phone /></div>
                                            <input type="tel" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value})} required placeholder="رقم الموبايل" dir="ltr" className="w-full bg-ocean-50/50 border border-ocean-100 focus:border-ocean-500 p-3.5 pl-4 pr-12 rounded-2xl outline-none font-bold text-gray-800 text-sm placeholder-gray-400 text-right shadow-sm" />
                                        </div>

                                        <div className="relative">
                                            <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none text-ocean-400"><Icons.Stethoscope /></div>
                                            <select value={formData.service} onChange={e=>setFormData({...formData, service: e.target.value})} className="w-full bg-ocean-50/50 border border-ocean-100 focus:border-ocean-500 p-3.5 pr-12 rounded-2xl outline-none font-bold text-gray-600 text-sm appearance-none shadow-sm cursor-pointer">
                                                <option value="">الخدمة المطلوبة (اختياري)</option>
                                                <option value="كشف عام">كشف عام</option>
                                                <option value="تنظيف وتلميع">تنظيف وتلميع</option>
                                                <option value="حشو">حشو</option>
                                                <option value="خلع">خلع</option>
                                                <option value="تقويم">تقويم</option>
                                                <option value="زراعة">زراعة</option>
                                                <option value="أخرى">أخرى / استشارة</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* فاصل جمالي */}
                                    <div className="flex items-center gap-4">
                                        <div className="h-px bg-gray-100 flex-1"></div>
                                        <span className="text-[10px] font-black text-gray-300 uppercase tracking-widest">تحديد الوقت</span>
                                        <div className="h-px bg-gray-100 flex-1"></div>
                                    </div>

                                    {/* القسم الثاني: التاريخ والمواعيد المتاحة */}
                                    <div className="space-y-4">
                                        <div className="relative">
                                            <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none text-ocean-400"><Icons.Calendar /></div>
                                            <input type="date" required value={selectedDate} onChange={(e) => { setSelectedDate(e.target.value); setSelectedTime(null); }} min={todayStr} className="w-full bg-white border-2 border-ocean-200 focus:border-ocean-500 p-3.5 pr-12 rounded-2xl outline-none font-bold text-ocean-900 text-sm cursor-pointer shadow-sm" />
                                        </div>

                                        {/* شبكة الأوقات */}
                                        <div className="bg-gray-50 border border-gray-100 rounded-2xl p-3">
                                            <label className="text-[10px] font-black text-gray-500 mb-3 block text-center">المواعيد المتاحة ليوم {selectedDate.split('-').reverse().join('-')}</label>
                                            
                                            <div className="grid grid-cols-3 sm:grid-cols-4 gap-2 slots-container max-h-48 overflow-y-auto pr-1 pb-1">
                                                {ALL_SLOTS.map(slot => {
                                                    // التحقق من أن الوقت لم يمر (إذا كان اليوم هو تاريخ اليوم)
                                                    let isPast = false;
                                                    if (selectedDate === todayStr) {
                                                        const [sh, sm] = slot.split(':').map(Number);
                                                        if (sh < currentHour || (sh === currentHour && sm <= currentMinute)) {
                                                            isPast = true;
                                                        }
                                                    }
                                                    const isBooked = bookedSlots.includes(slot) || isPast;
                                                    const isSelected = selectedTime === slot;
                                                    
                                                    return (
                                                        <button
                                                            key={slot}
                                                            type="button"
                                                            disabled={isBooked}
                                                            onClick={() => setSelectedTime(slot)}
                                                            className={`py-2 rounded-xl text-xs font-bold transition-all border-2 ${
                                                                isBooked 
                                                                ? 'bg-gray-100 border-transparent text-gray-400 cursor-not-allowed opacity-60'
                                                                : isSelected
                                                                ? 'bg-ocean-500 border-ocean-500 text-white shadow-md scale-105'
                                                                : 'bg-white border-ocean-100 text-ocean-700 hover:border-ocean-300 hover:bg-ocean-50'
                                                            }`}
                                                        >
                                                            {formatTime(slot)}
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    {/* زر التأكيد */}
                                    <button 
                                        type="submit" 
                                        disabled={isSubmitting || !selectedTime}
                                        className="w-full bg-ocean-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-ocean-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-base flex justify-center items-center gap-2"
                                    >
                                        {isSubmitting ? 'جاري التحميل...' : currentApp ? 'حفظ التعديل' : 'تأكيد الحجز'}
                                    </button>
                                </form>
                                
                                {!currentApp && (
                                    <div className="mt-6 pt-6 border-t border-gray-100 text-center">
                                        <button onClick={() => setView('manageAuth')} className="text-xs font-bold text-ocean-600 hover:text-ocean-800 transition-colors flex items-center justify-center gap-1.5 mx-auto bg-ocean-50 px-4 py-2 rounded-full">
                                            <Icons.Edit /> إدارة حجز سابق (تعديل/إلغاء)
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ===================== 2. شاشة النجاح والكود ===================== */}
                        {view === 'success' && (
                            <div className="bg-white max-w-sm w-full p-8 sm:p-10 rounded-[30px] shadow-2xl text-center z-10 animate-pop border border-ocean-100 mt-4">
                                <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <Icons.Check />
                                </div>
                                <h2 className="text-2xl font-black text-gray-800 mb-2">تم بنجاح!</h2>
                                <p className="text-gray-500 font-bold mb-6 text-xs">تم تسجيل موعدك بأمان في نظام العيادة.</p>
                                
                                <div className="bg-ocean-50 border border-ocean-100 rounded-3xl p-6 mb-8">
                                    <p className="text-[10px] font-black uppercase tracking-widest text-ocean-500 mb-2">كود الحجز الخاص بك</p>
                                    <p className="text-4xl font-black text-ocean-700 tracking-[0.2em]">{bookingCode}</p>
                                    <p className="text-[9px] text-gray-400 mt-3 font-bold bg-white p-2 rounded-xl">⚠️ احتفظ بهذا الكود لتتمكن من تعديل أو إلغاء موعدك لاحقاً</p>
                                </div>

                                <button onClick={() => {setView('book'); setFormData({patientName:'',phone:'',service:''})}} className="w-full py-3.5 bg-ocean-600 text-white font-black rounded-xl hover:bg-ocean-700 shadow-md transition-colors text-sm">
                                    العودة للرئيسية
                                </button>
                            </div>
                        )}

                        {/* ===================== 3. شاشة البحث لتعديل الحجز ===================== */}
                        {view === 'manageAuth' && (
                            <div className="bg-white max-w-sm w-full p-8 rounded-[30px] shadow-2xl text-center z-10 animate-pop mt-4 relative">
                                {/* زرار الإغلاق */}
                                <button onClick={() => {setView('book'); setError("");}} className="absolute top-5 left-5 text-gray-300 hover:text-red-500 bg-gray-50 hover:bg-red-50 p-2 rounded-full transition-colors">
                                    <Icons.X />
                                </button>
                                
                                <div className="w-16 h-16 bg-ocean-50 text-ocean-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                    <Icons.Key />
                                </div>
                                <h2 className="text-xl font-black text-gray-800 mb-2">إدارة موعدك</h2>
                                <p className="text-gray-500 font-bold mb-8 text-xs">أدخل كود الحجز الذي حصلت عليه مسبقاً.</p>
                                
                                {error && <div className="bg-red-50 text-red-500 p-3 rounded-xl text-[11px] font-bold mb-6 animate-pop">{error}</div>}

                                <form onSubmit={handleSearchBooking}>
                                    <input 
                                        type="text" 
                                        name="searchCode" 
                                        required 
                                        placeholder="مثال: C4821" 
                                        dir="ltr"
                                        className="w-full bg-gray-50 border border-gray-200 focus:border-ocean-500 p-4 rounded-2xl outline-none font-black text-center text-lg tracking-[0.2em] text-gray-800 uppercase mb-6" 
                                    />
                                    <button disabled={isSubmitting} type="submit" className="w-full py-4 bg-ocean-600 text-white font-black rounded-xl hover:bg-ocean-700 transition-colors shadow-md disabled:opacity-50 text-sm">
                                        {isSubmitting ? 'جاري البحث...' : 'بحث عن الحجز'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* ===================== 4. شاشة تفاصيل الحجز (إلغاء / تعديل) ===================== */}
                        {view === 'manageAction' && currentApp && (
                            <div className="bg-white max-w-sm w-full p-8 rounded-[30px] shadow-2xl z-10 animate-pop mt-4 relative">
                                {/* زرار الإغلاق */}
                                <button onClick={() => {setView('book'); setCurrentApp(null); setFormData({ patientName: '', phone: '', service: '' });}} className="absolute top-5 left-5 text-gray-300 hover:text-red-500 bg-gray-50 hover:bg-red-50 p-2 rounded-full transition-colors">
                                    <Icons.X />
                                </button>
                                
                                <h2 className="text-lg font-black text-gray-800 mb-6 text-center border-b border-gray-100 pb-4 pt-2">بيانات الحجز</h2>
                                
                                <div className="space-y-3 mb-8">
                                    <div className="flex items-center gap-3 bg-ocean-50/50 p-4 rounded-2xl border border-ocean-50">
                                        <div className="text-ocean-500"><Icons.User/></div>
                                        <div><p className="text-[10px] text-gray-400 font-bold">الاسم</p><p className="font-black text-sm text-gray-800">{currentApp.patientName}</p></div>
                                    </div>
                                    <div className="flex items-center gap-3 bg-ocean-50/50 p-4 rounded-2xl border border-ocean-50">
                                        <div className="text-ocean-500"><Icons.Calendar/></div>
                                        <div><p className="text-[10px] text-gray-400 font-bold">الموعد</p><p className="font-black text-sm text-ocean-700">{currentApp.date} • {formatTime(currentApp.time)}</p></div>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <button onClick={handleEditBooking} className="w-full py-3.5 bg-ocean-600 text-white font-black rounded-xl shadow-md hover:bg-ocean-700 transition-colors flex justify-center items-center gap-2 text-sm">
                                        <Icons.Edit/> تعديل الموعد
                                    </button>
                                    <button disabled={isSubmitting} onClick={handleDeleteBooking} className="w-full py-3.5 bg-red-50 text-red-500 font-black rounded-xl hover:bg-red-100 transition-colors flex justify-center items-center gap-2 text-sm">
                                        <Icons.Trash/> إلغاء الحجز نهائياً
                                    </button>
                                </div>
                            </div>
                        )}

                        <p className="text-center text-[10px] text-ocean-200 font-bold mt-8 uppercase tracking-widest relative z-10">
                            Secured by Clinic System
                        </p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
